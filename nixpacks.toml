# Coolify/Nixpacks build config.
#
# Node 23 — Nixpacks' default nodejs_22 resolves to 22.11, below Vite 8's
# minimum (22.12+ or 20.19+); on 22.11 Vite's embedded rolldown bundler fails
# to load its native binding.
#
# pnpm 10 via `npm install -g` — Nixpacks bundles pnpm 9.15. pnpm 9 produces a
# different module graph for rolldown's platform-specific deps that crashes
# the build inside vite:css-post ("css content for \"\" was not found"). We
# install pnpm 10 through npm (not Corepack) because Node 23.2's Corepack has
# stale signing keys and fails with a "Cannot find matching keyid" error.

[phases.setup]
nixPkgs = ["nodejs_23"]

[phases.install]
cmds = [
    "npm install -g pnpm@10.18.0",
    "pnpm install --frozen-lockfile",
]

[phases.build]
cmds = ["pnpm run build"]

# Pins Node 23 for Coolify/Nixpacks builds. Nixpacks' default nodejs_22
# resolves to 22.11 in the current nixpkgs pin; pg-boss 12 requires 22.12+.
# When Nixpacks updates its pin past 22.12, this override can be dropped.
[phases.setup]
nixPkgs = ["nodejs_23", "pnpm-9_x"]

# Explicit start command:
# 1. Run any pending Drizzle migrations on every boot. Idempotent — a DB that
#    is already up-to-date is a no-op.
# 2. Start the Nitro/Node SSR server built by `vite build`. Without this
#    override Nixpacks misdetects TanStack Start as a static SPA and runs a
#    Caddy file-server instead, which returns 404 for every request because
#    there is no index.html.
[start]
cmd = "pnpm db:migrate && node .output/server/index.mjs"

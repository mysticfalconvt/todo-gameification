# Pins Node 23 for Coolify/Nixpacks builds. Nixpacks' default `nodejs_22`
# resolves to 22.11 in its current nixpkgs pin, which is below pg-boss 12's
# required Node 22.12+. Whenever Nixpacks updates its pin past 22.12, this
# override can be dropped and Nixpacks can auto-detect everything from
# package.json + pnpm-lock.yaml.
[phases.setup]
nixPkgs = ["nodejs_23", "pnpm-9_x"]

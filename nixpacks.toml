# Coolify/Nixpacks build config.
#
# Pins Node 23 because Nixpacks' default nodejs_22 resolves to 22.11, which is
# below Vite 8's minimum (22.12+ or 20.19+); on 22.11, Vite's embedded rolldown
# bundler fails to load its native binding.
#
# We override the install phase to use Corepack + the `packageManager` field in
# package.json, which pulls in the exact pnpm version we develop against
# locally (10.x). Nixpacks' bundled pnpm is 9.15, and pnpm 9 produces a
# different module graph for rolldown's platform-specific deps that crashes the
# build in the vite:css-post plugin.

[phases.setup]
nixPkgs = ["nodejs_23"]

[phases.install]
cmds = [
    "corepack enable",
    "pnpm install --frozen-lockfile",
]

[phases.build]
cmds = ["pnpm run build"]
